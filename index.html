    <!-- Structured data: helps Google understand this as a product page -->

    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Aura Herbal Hair Oil",

        "@type": "Brand",
        "name": "Aura Herbal"

      "offers": {

        "priceCurrency": "INR",

        "availability": "https://schema.org/InStock"
      }

    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Aura Herbal",
      "url": "https://aura-herbal.in/",
      "logo": "https://aura-herbal.in/images/logo.png",
      "sameAs": [
        "https://www.instagram.com/auraherbal._"
      ]
    }

  </head>
